[package]
name = "chineseai"
version = "0.1.0"
edition = "2024"

[dependencies]
tensorboard-rs = "0.5"
lz4_flex = { version = "0.11", default-features = false, features = ["std"] }
ctrlc = "3.4"
candle-core = { version = "0.10.2", features = ["cuda"] }
candle-nn = "0.10.2"

# Linux glibc 下启用 jemalloc。musl 目标不拉此依赖（且 build.rs 会直接拒绝 musl）。
[target.'cfg(all(target_os = "linux", not(target_env = "musl")))'.dependencies]
tikv-jemallocator = "0.6"

[profile.release]
lto = "fat"
codegen-units = 1
panic = "abort"
